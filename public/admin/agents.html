<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TOJ Agents · Admin</title>
<style>
  :root { --ink:#1A1613; --cream:#F5F1EA; --gold:#B8843B; --pine:#2F5D4E; --clay:#A85F26; --muted:#6b6156; }
  * { box-sizing:border-box; }
  body { font-family: system-ui,-apple-system,sans-serif; background:var(--cream); color:var(--ink); margin:0; padding:32px; max-width:960px; margin-inline:auto; line-height:1.5; }
  h1 { font-family: Georgia,serif; margin:0 0 4px; }
  p.sub { color:var(--muted); margin:0 0 28px; }
  label { display:block; font-weight:600; margin:16px 0 6px; font-size:14px; }
  select, input, textarea, button { font: inherit; padding:10px 12px; border:1px solid #d4ccc0; border-radius:8px; background:#fff; width:100%; }
  textarea { min-height:120px; resize:vertical; }
  button { background:var(--ink); color:#fff; font-weight:600; cursor:pointer; margin-top:20px; border:0; }
  button:disabled { opacity:.5; cursor:wait; }
  .row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .roles { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:12px; margin:8px 0 20px; }
  .role-card { border:1px solid #d4ccc0; border-radius:10px; padding:14px; background:#fff; cursor:pointer; transition:border-color .1s; }
  .role-card:hover { border-color:var(--gold); }
  .role-card.selected { border-color:var(--ink); background:#fef8ee; }
  .role-card h3 { margin:0 0 4px; font-size:15px; }
  .role-card p { margin:0 0 8px; font-size:13px; color:var(--muted); }
  .chip { display:inline-block; padding:2px 8px; background:#f0e8d8; border-radius:99px; font-size:11px; color:var(--clay); margin-right:4px; }
  #output { margin-top:32px; padding:24px; background:#fff; border-radius:12px; border:1px solid #e8e0d0; white-space:pre-wrap; font-family: ui-monospace,monospace; font-size:13px; display:none; }
  #output.show { display:block; }
  .trace { margin-top:20px; padding:16px; background:#f7f2e8; border-radius:8px; font-size:12px; color:var(--muted); white-space:normal; font-family:system-ui,sans-serif; }
  .err { color:#b0343c; }
  .authwarn { display:none; margin:8px 0 20px; padding:12px; background:#fef3e2; border:1px solid #f0c674; border-radius:8px; font-size:13px; }
</style>

<h1>TOJ Agents</h1>
<p class="sub">Pick a role. Same tools + client memory; different persona and skills.</p>

<div id="authwarn" class="authwarn">⚠️ You're not signed in. <a href="/login.html">Log in</a> first — the run endpoint requires auth.</div>

<label>Role</label>
<div id="roles" class="roles">Loading roles…</div>

<div class="row">
  <div>
    <label>Client scope (optional)</label>
    <input id="client_id" placeholder="client UUID (leave blank for cross-client tasks)">
  </div>
</div>

<label>Task</label>
<textarea id="task" placeholder="Describe the specific task. Be concrete: what medium, what audience, what outcome."></textarea>

<button id="run">Run agent</button>
<div id="output"></div>

<script>
let selectedRole = null;

fetch("/api/me").then(r=>r.json()).then(d=>{
  if (!d.authenticated) document.getElementById("authwarn").style.display = "block";
}).catch(()=>{});

fetch("/api/agents/roles")
  .then(r => r.ok ? r.json() : Promise.reject(r.status))
  .then(d => renderRoles(d.roles))
  .catch(err => {
    document.getElementById("roles").innerHTML =
      `<div class="err">Could not load roles (${err}). ${err===401?'Log in first.':'Check server logs.'}</div>`;
  });

function renderRoles(roles) {
  const c = document.getElementById("roles");
  if (!roles || !roles.length) { c.innerHTML = "<div class='err'>No roles found on server.</div>"; return; }
  c.innerHTML = roles.map(r => `
    <div class="role-card" data-id="${r.id}">
      <h3>${r.label}</h3>
      <p>${r.tagline || ""}</p>
      ${(r.skills||[]).map(s=>`<span class="chip">${s}</span>`).join("")}
    </div>
  `).join("");
  c.querySelectorAll(".role-card").forEach(card => {
    card.addEventListener("click", () => {
      c.querySelectorAll(".role-card").forEach(x => x.classList.remove("selected"));
      card.classList.add("selected");
      selectedRole = card.dataset.id;
    });
  });
  // preselect first
  c.querySelector(".role-card")?.click();
}

document.getElementById("run").addEventListener("click", async () => {
  if (!selectedRole) return alert("Pick a role first");
  const btn = document.getElementById("run");
  const out = document.getElementById("output");
  const task = document.getElementById("task").value.trim();
  const client_id = document.getElementById("client_id").value.trim() || null;
  if (!task) return alert("Task is required");
  btn.disabled = true; btn.textContent = "Running (30–90s)…";
  out.className = "show"; out.textContent = "Working…";
  try {
    const r = await fetch("/api/agents/run", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ role: selectedRole, task, client_id })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || "failed");
    const toolCalls = d.trace.filter(t=>t.type==="tool_use");
    out.innerHTML = `<b>${d.label} Agent</b>\n\n${d.output}` +
      `<div class="trace"><b>Trace</b> — ${toolCalls.length} tool calls · stop=${d.stop_reason} · ${d.usage.input_tokens} in / ${d.usage.output_tokens} out` +
      (toolCalls.length ? `<details style="margin-top:8px;"><summary>tool calls</summary>${toolCalls.map(t=>`<div>→ ${t.name}(${JSON.stringify(t.input).slice(0,140)})</div>`).join("")}</details>` : "") +
      `</div>`;
  } catch (e) {
    out.innerHTML = `<span class="err">Error: ${e.message}</span>`;
  } finally {
    btn.disabled = false; btn.textContent = "Run agent";
  }
});
</script>
